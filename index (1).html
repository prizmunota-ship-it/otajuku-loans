<!DOCTYPE html>

<style>
:root {
  --gold: #D4920A; --gold-lt: #F5C400; --gold-bg: #FFF8E1; --gold-mid: #FFE082;
  --amber: #E8A000; --dark: #1C1400; --dark2: #3D2B00; --mid: #7A5800; --muted: #A08040;
  --card-bg: #FFFEF7; --ok: #1558A7; --good: #1A7A3A; --caution: #C06000; --ng: #B52020;
  --border: #EDD97A; --shadow: rgba(180,130,0,0.13);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Hiragino Sans','Hiragino Kaku Gothic ProN','Yu Gothic UI','Yu Gothic','Meiryo',sans-serif; background:#FDF6DC; min-height:100vh; color:var(--dark2); }
header { background:linear-gradient(135deg,var(--amber) 0%,var(--gold) 60%,#C47800 100%); padding:20px 16px 14px; position:sticky; top:0; z-index:100; box-shadow:0 3px 16px rgba(180,110,0,0.35); }
.header-inner { max-width:700px; margin:0 auto; }
.header-label { font-size:11px; font-weight:700; letter-spacing:0.15em; color:rgba(255,255,255,0.85); margin-bottom:3px; }
h1 { font-size:20px; font-weight:900; color:#fff; letter-spacing:0.04em; }
.header-sub { font-size:10px; color:rgba(255,255,255,0.7); margin-top:3px; }
.legend { display:flex; gap:12px; flex-wrap:wrap; margin-top:10px; padding-top:10px; border-top:1px solid rgba(255,255,255,0.25); }
.legend-item { display:flex; align-items:center; gap:4px; font-size:11px; color:rgba(255,255,255,0.9); font-weight:500; }
.lmark { font-size:13px; font-weight:900; }
.lmark.g{color:#7FFFA0;} .lmark.o{color:#90CAFF;} .lmark.c{color:#FFD080;} .lmark.n{color:#FF9090;}
.filter-bar { background:var(--gold-bg); border-bottom:1.5px solid var(--border); padding:10px 16px; position:sticky; top:118px; z-index:90; }
.filter-inner { max-width:700px; margin:0 auto; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
.search-wrap { flex:1; min-width:160px; position:relative; }
.search-wrap svg { position:absolute; left:10px; top:50%; transform:translateY(-50%); width:15px; height:15px; opacity:0.4; }
#searchInput { width:100%; padding:8px 10px 8px 32px; border:1.5px solid var(--border); border-radius:8px; background:#fff; font-size:13px; color:var(--dark2); font-family:inherit; outline:none; }
#searchInput:focus { border-color:var(--gold); }
.chips { display:flex; gap:6px; flex-wrap:wrap; }
.chip { padding:5px 12px; border-radius:20px; border:1.5px solid var(--border); background:#fff; font-size:12px; font-weight:600; color:var(--mid); cursor:pointer; font-family:inherit; }
.chip.active { background:var(--gold-lt); border-color:var(--amber); color:var(--dark2); }
.count { font-size:11px; color:var(--muted); }
.cards { max-width:700px; margin:0 auto; padding:14px 12px 40px; display:flex; flex-direction:column; gap:12px; }
.card { background:var(--card-bg); border-radius:14px; border:1.5px solid var(--border); box-shadow:0 2px 12px var(--shadow); overflow:hidden; }
.card-head { padding:13px 16px 11px; display:flex; align-items:flex-start; gap:10px; cursor:pointer; background:linear-gradient(to right,#FFFBEC,#FFF8D6); border-bottom:1.5px solid transparent; }
.card.open .card-head { border-bottom-color:var(--border); }
.type-badge { font-size:10px; font-weight:700; padding:3px 7px; border-radius:5px; white-space:nowrap; margin-top:2px; flex-shrink:0; }
.b-bank{background:#FFF0CC;color:#8A5A00;border:1px solid #DDAA44;}
.b-shinku{background:#E8F4E8;color:#2A6A2A;border:1px solid #88CC88;}
.b-shinkin{background:#E8F0FF;color:#2244AA;border:1px solid #88AADD;}
.b-non{background:#FFE8E0;color:#992200;border:1px solid #CC8877;}
.card-title-area { flex:1; min-width:0; }
.card-name { font-size:16px; font-weight:800; color:var(--dark); }
.card-meta { display:flex; gap:6px; flex-wrap:wrap; margin-top:5px; }
.meta-pill { font-size:10px; font-weight:600; background:rgba(212,146,10,0.1); color:var(--mid); padding:2px 7px; border-radius:10px; border:1px solid rgba(212,146,10,0.2); }
.eval-row { display:flex; gap:8px; align-items:center; margin-top:6px; }
.eval-item { display:flex; align-items:center; gap:3px; font-size:11px; color:var(--muted); }
.em { font-size:16px; font-weight:900; line-height:1; }
.em-good{color:var(--good);} .em-ok{color:var(--ok);} .em-caut{color:var(--caution);} .em-ng{color:var(--ng);} .em-none{color:#ccc;font-size:13px;}
.rate-val { font-size:13px; font-weight:700; color:var(--ok); font-family:'Courier New',monospace; }
.chevron { width:20px; height:20px; flex-shrink:0; margin-top:3px; color:var(--muted); transition:transform .25s; }
.card.open .chevron { transform:rotate(180deg); }
.no-info-badge { font-size:11px; color:var(--muted); background:rgba(160,128,64,0.08); border:1px dashed var(--border); border-radius:6px; padding:2px 8px; margin-top:4px; display:inline-block; }
.card-body { max-height: 0; overflow: hidden; transition: max-height .35s ease; }
.card.open .card-body { max-height: 99999px; }
.card-body-inner { padding:14px 16px 16px; }
.section { margin-bottom:14px; }
.section:last-child { margin-bottom:0; }
.sec-title { font-size:10px; font-weight:800; letter-spacing:0.12em; color:var(--amber); padding-bottom:5px; border-bottom:1.5px solid var(--gold-mid); margin-bottom:8px; }
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:7px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:7px;}
.grid1{display:grid;grid-template-columns:1fr;gap:6px;margin-bottom:7px;}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:5px;margin-bottom:7px;}
.ic { background:var(--gold-bg); border-radius:8px; border:1px solid rgba(212,146,10,0.18); padding:7px 9px; }
.ic .lb { font-size:9px; font-weight:700; color:var(--muted); letter-spacing:0.08em; margin-bottom:3px; }
.ic .vl { font-size:12px; font-weight:600; color:var(--dark2); line-height:1.5; white-space:pre-wrap; }
.ic .vl.rate { font-family:'Courier New',monospace; font-size:14px; font-weight:700; color:var(--ok); }
.ic .vl.mt { color:#BBB; font-weight:400; }
.struct-cell { background:var(--gold-bg); border:1px solid rgba(212,146,10,0.18); border-radius:7px; padding:6px 4px; text-align:center; }
.struct-cell .sl { font-size:9px; font-weight:700; color:var(--muted); margin-bottom:3px; }
.struct-cell .sm { font-size:14px; font-weight:900; line-height:1; }
.struct-cell .sy { font-size:10px; font-weight:600; color:var(--dark2); margin-top:2px; line-height:1.3; }
.memo { background:#FFFBF0; border-left:3px solid var(--gold-lt); border-radius:0 8px 8px 0; padding:8px 10px; font-size:12px; line-height:1.75; color:var(--dark2); white-space:pre-wrap; }
.memo.empty { color:#CCC; font-size:11px; font-style:italic; }
.upd { font-size:10px; color:var(--muted); background:rgba(212,146,10,0.08); padding:2px 6px; border-radius:4px; border:1px solid rgba(212,146,10,0.15); font-family:'Courier New',monospace; }
.area-boxes { display:flex; flex-direction:column; gap:6px; margin-bottom:7px; }
.area-box { border-radius:8px; padding:7px 10px; }
.area-box .ab-label { font-size:9px; font-weight:800; letter-spacing:0.1em; margin-bottom:4px; }
.area-box .ab-text { font-size:12px; font-weight:500; line-height:1.6; white-space:pre-wrap; }
.area-general { background:var(--gold-bg); border:1px solid rgba(212,146,10,0.2); }
.area-general .ab-label { color:var(--muted); }
.area-general .ab-text { color:var(--dark2); }
.area-posi { background:#EDF7EE; border:1px solid #A8D8AA; }
.area-posi .ab-label { color:#1A7A3A; }
.area-posi .ab-text { color:#1A4A20; }
.area-nega { background:#FEF0EF; border:1px solid #F0AAAA; }
.area-nega .ab-label { color:#B52020; }
.area-nega .ab-text { color:#7A1515; }
.no-data-section { text-align:center; padding:20px; color:#CCC; font-size:12px; border:1.5px dashed #EDD97A; border-radius:8px; }
.report-list { display:flex; flex-direction:column; gap:10px; }
.report-card { background:#FFFDF5; border:1.5px solid #F5C400; border-radius:10px; overflow:hidden; }
.report-header { background:linear-gradient(to right,#FFF3B0,#FFE566); padding:8px 12px; display:flex; align-items:center; gap:8px; }
.report-icon { font-size:16px; }
.report-name { font-size:13px; font-weight:800; color:var(--dark2); }
.report-date { font-size:10px; color:var(--muted); font-family:'Courier New',monospace; margin-left:auto; }
.report-body { padding:10px 12px; display:flex; flex-direction:column; gap:8px; }
.report-section-label { font-size:9px; font-weight:800; letter-spacing:0.12em; padding:4px 8px; border-radius:4px; margin-bottom:4px; display:inline-block; }
.report-section-label.spec { background:#E8F4FF; color:#1558A7; border:1px solid #A8CCEE; }
.report-section-label.loan { background:#E8F7EE; color:#1A7A3A; border:1px solid #A8D8AA; }
.report-grid { display:grid; grid-template-columns:1fr 1fr; gap:5px; }
.report-cell { border-radius:6px; border:1px solid transparent; padding:5px 8px; }
.report-cell.spec-cell { background:#F0F8FF; border-color:rgba(21,88,167,0.15); }
.report-cell.loan-cell { background:#F0FFF4; border-color:rgba(26,122,58,0.15); }
.report-cell .rl { font-size:9px; font-weight:700; color:var(--muted); margin-bottom:2px; letter-spacing:0.06em; }
.report-cell .rv { font-size:12px; font-weight:600; color:var(--dark2); line-height:1.4; }
.report-cell .rv.highlight-blue { color:#1558A7; font-family:'Courier New',monospace; font-size:13px; font-weight:700; }
.report-cell .rv.highlight-green { color:#1A7A3A; font-family:'Courier New',monospace; font-size:13px; font-weight:700; }
.report-count-badge { display:inline-flex; align-items:center; gap:4px; background:#FFF3B0; border:1px solid #F5C400; border-radius:10px; padding:2px 8px; font-size:10px; font-weight:700; color:var(--dark2); margin-bottom:8px; }
.empty-state { text-align:center; padding:60px 20px; color:var(--muted); font-size:14px; }
#scrollTop { position:fixed; bottom:20px; right:16px; width:42px; height:42px; background:var(--amber); color:#fff; border:none; border-radius:50%; font-size:18px; cursor:pointer; box-shadow:0 4px 14px rgba(180,110,0,0.4); display:none; align-items:center; justify-content:center; z-index:200; }
#scrollTop.show { display:flex; }
</style>
</head>

<div class="cards" id="cardContainer"></div>

function scell(label,val,highlight){
  return '<div class="report-cell spec-cell"><div class="rl">'+label+'</div><div class="rv'+(highlight?" highlight-blue":"")+'">'+val+'</div></div>';
}
function lcell(label,val,highlight){
  return '<div class="report-cell loan-cell"><div class="rl">'+label+'</div><div class="rv'+(highlight?" highlight-green":"")+'">'+val+'</div></div>';
}
function renderReports(name){
  var list=REPORTS[name];
  if(!list||list.length===0) return "";
  var html='<div class="section"><div class="sec-title">🏡 購入報告</div>';
  html+='<div class="report-count-badge">🎉 '+list.length+'件の実績</div>';
  html+='<div class="report-list">';
  // 新しい順（配列の先頭が最新）
  for(var i=0;i<list.length;i++){
    var r=list[i];
    html+='<div class="report-card">';
    html+='<div class="report-header"><span class="report-icon">🏠</span><span class="report-name">'+r.氏名+'</span><span class="report-date">'+r.日付+'</span></div>';
    html+='<div class="report-body">';
    // 物件スペック（青）
    html+='<div><span class="report-section-label spec">🏠 物件スペック</span>';
    html+='<div class="report-grid">';
    html+=scell("購入金額",r.購入金額,true);
    html+=scell("利回り",r.利回り,true);
    html+=scell("所在地",r.所在地);
    html+=scell("築年数",r.築年数);
    html+=scell("構造",r.構造);
    html+=scell("部屋数",r.部屋数);
    if(r.課税評価額) html+=scell("課税評価額",r.課税評価額);
    html+='</div></div>';
    // 融資条件（緑）
    html+='<div><span class="report-section-label loan">💴 融資条件</span>';
    html+='<div class="report-grid">';
    html+=lcell("融資金額",r.融資金額,true);
    html+=lcell("金利",r.金利,true);
    html+=lcell("融資期間",r.融資期間);
    html+=lcell("返済比率",r.返済比率);
    if(r.支店) html+=lcell("支店",r.支店);
    html+='</div>';
    if(r.備考) html+='<div style="margin-top:5px"><div class="report-cell loan-cell" style="grid-column:1/-1"><div class="rl">内訳・備考</div><div class="rv" style="white-space:pre-wrap">'+r.備考+'</div></div></div>';
    html+='</div>';
    html+='</div></div>';
  }
  html+='</div></div>';
  return html;
}

function badgeClass(t){
  if(t==="銀行") return "b-bank";
  if(t==="信用組合") return "b-shinku";
  if(t==="信用金庫") return "b-shinkin";
  return "b-non";
}
function markInfo(v){
  if(!v||v==="—") return {cls:"em-none",mark:"—"};
  if(v.indexOf("◎")>=0) return {cls:"em-good",mark:"◎"};
  if(v.indexOf("○")>=0||v.indexOf("〇")>=0) return {cls:"em-ok",mark:"○"};
  if(v.indexOf("▲")>=0) return {cls:"em-caut",mark:"▲"};
  if(v.indexOf("×")>=0) return {cls:"em-ng",mark:"×"};
  return {cls:"em-none",mark:v};
}
function structColor(v){
  if(!v||v==="—") return "#CCC";
  if(v.indexOf("◎")>=0) return "var(--good)";
  if(v.indexOf("○")>=0) return "var(--ok)";
  if(v.indexOf("▲")>=0) return "var(--caution)";
  return "#CCC";
}
function ic(label,val,extra){
  var empty=(!val||val==="—");
  return '<div class="ic"><div class="lb">'+label+'</div><div class="vl'+(extra?" "+extra:"")+(empty?" mt":"")+'">'+( empty?"—":val)+'</div></div>';
}
function memo(text){
  if(!text||text==="—") return '<div class="memo empty">記録なし</div>';
  return '<div class="memo">'+text+'</div>';
}
function structCell(label,val){
  if(!val||val==="—") return '<div class="struct-cell"><div class="sl">'+label+'</div><div class="sm" style="color:#CCC">—</div></div>';
  var parts=val.split(" "); var mark=parts[0]; var year=parts.slice(1).join(" ");
  return '<div class="struct-cell"><div class="sl">'+label+'</div><div class="sm" style="color:'+structColor(val)+'">'+mark+'</div>'+(year?'<div class="sy">'+year+'</div>':'')+'</div>';
}
function areaSection(d){
  var hasGeneral=d.物件エリア&&d.物件エリア!=="—";
  var hasPosi=d.物件ポジ&&d.物件ポジ!=="";
  var hasNega=d.物件ネガ&&d.物件ネガ!=="";
  if(!hasGeneral&&!hasPosi&&!hasNega) return '<div class="area-boxes"><div class="area-box area-general"><div class="ab-label">対象エリア</div><div class="ab-text" style="color:#CCC">情報なし</div></div></div>';
  var html='<div class="area-boxes">';
  if(hasGeneral) html+='<div class="area-box area-general"><div class="ab-label">対象エリア</div><div class="ab-text">'+d.物件エリア+'</div></div>';
  if(hasPosi) html+='<div class="area-box area-posi"><div class="ab-label">✅ ポジティブエリア</div><div class="ab-text">'+d.物件ポジ+'</div></div>';
  if(hasNega) html+='<div class="area-box area-nega"><div class="ab-label">⚠️ ネガティブ・NGエリア</div><div class="ab-text">'+d.物件ネガ+'</div></div>';
  html+='</div>';
  return html;
}

function hasAnyInfo(d){
  return (d.契約エリア&&d.契約エリア!=="—")||(d.金利&&d.金利!=="—")||(d.木造&&d.木造!=="—");
}

function renderCard(d,idx){
  var m1=markInfo(d.個人), m2=markInfo(d.法人);
  var meta="";
  if(d.年収&&d.年収!=="—") meta+='<span class="meta-pill">年収 '+d.年収+'</span>';
  if(d.契約エリア&&d.契約エリア!=="—") meta+='<span class="meta-pill">'+d.契約エリア.split("\n")[0]+'</span>';

  var bodyContent;
  if(!hasAnyInfo(d)){
    bodyContent='<div class="no-data-section">情報収集中です。詳細が分かり次第更新します。</div>'+renderReports(d.名称);
  } else {
    bodyContent=
      '<div class="section">'+
        '<div class="sec-title">契約者条件</div>'+
        '<div class="grid2">'+ic("契約エリア",d.契約エリア)+ic("年収目安",d.年収)+'</div>'+
        memo(d.契約備忘)+
      '</div>'+
      '<div class="section">'+
        '<div class="sec-title">物件・融資期間</div>'+
        areaSection(d)+
        '<div class="grid4">'+structCell("木造",d.木造)+structCell("軽鉄",d.軽鉄)+structCell("重鉄",d.重鉄)+structCell("RC",d.RC)+'</div>'+
        (d.新築MAX&&d.新築MAX!=="—"?'<div class="grid1">'+ic("新築MAX融資期間",d.新築MAX)+'</div>':'')+
        memo(d.期間備忘)+
      '</div>'+
      '<div class="section">'+
        '<div class="sec-title">融資条件</div>'+
        '<div class="grid2">'+ic("金利",d.金利,"rate")+ic("自己資金",d.自己資金)+'</div>'+
        '<div class="grid3">'+ic("保証料",d.保証料)+ic("出資金",d.出資金)+ic("事務手数料",d.事務手数料)+'</div>'+
        '<div class="grid1">'+ic("保証人",d.保証人)+'</div>'+
        '<div style="margin-top:7px">'+memo(d.条件備忘)+'</div>'+
      '</div>'+
      renderReports(d.名称);
  }

  return '<div class="card" id="c'+idx+'">'+
    '<div class="card-head" onclick="tog('+idx+')">'+
      '<span class="type-badge '+badgeClass(d.種類)+'">'+d.種類+'</span>'+
      '<div class="card-title-area">'+
        '<div class="card-name">'+d.名称+'</div>'+
        '<div class="card-meta">'+meta+((!hasAnyInfo(d))?'<span class="no-info-badge">情報収集中</span>':'')+'</div>'+
        (hasAnyInfo(d)?
          '<div class="eval-row">'+
            '<div class="eval-item"><span class="em '+m1.cls+'">'+m1.mark+'</span>個人</div>'+
            '<div class="eval-item"><span class="em '+m2.cls+'">'+m2.mark+'</span>法人</div>'+
            '<div class="eval-item" style="margin-left:4px">金利&nbsp;<span class="rate-val">'+(d.金利||"—")+'</span></div>'+
          '</div>':'')+
      '</div>'+
      '<svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m6 9 6 6 6-6"/></svg>'+
    '</div>'+
    '<div class="card-body"><div class="card-body-inner">'+bodyContent+'</div></div>'+
  '</div>';
}

function tog(idx){ document.getElementById("c"+idx).classList.toggle("open"); }

var curType="all", curQ="";
function render(){
  var filtered=DATA.filter(function(d){
    var tok=(curType==="all"||d.種類===curType);
    var sq=(!curQ||d.名称.indexOf(curQ)>=0||(d.契約エリア||"").indexOf(curQ)>=0||(d.物件エリア||"").indexOf(curQ)>=0||(d.種類||"").indexOf(curQ)>=0);
    return tok&&sq;
  });
  var box=document.getElementById("cardContainer");
  if(filtered.length===0){
    box.innerHTML='<div class="empty-state">該当する金融機関が見つかりません</div>';
  } else {
    var html="";
    for(var i=0;i<filtered.length;i++) html+=renderCard(filtered[i],DATA.indexOf(filtered[i]));
    box.innerHTML=html;
  }
  document.getElementById("countLabel").textContent=filtered.length+"件";
}
document.querySelectorAll(".chip").forEach(function(btn){
  btn.addEventListener("click",function(){
    document.querySelectorAll(".chip").forEach(function(b){b.classList.remove("active");});
    btn.classList.add("active");
    curType=btn.getAttribute("data-type");
    render();
  });
});
document.getElementById("searchInput").addEventListener("input",function(e){ curQ=e.target.value; render(); });
window.addEventListener("scroll",function(){ var st=document.getElementById("scrollTop"); if(window.scrollY>300) st.classList.add("show"); else st.classList.remove("show"); });
render();
</script>
